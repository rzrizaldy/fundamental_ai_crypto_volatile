name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # config.yaml expects models/artifacts/logistic_model.joblib, but root *.joblib is gitignored.
      # The same file is tracked under the MLflow run layout — copy it before pytest.
      - name: Materialize model artifact path for tests
        run: |
          mkdir -p models/artifacts
          cp "models/artifacts/1/77ca4f22849d4b41837227c266bbe83c/artifacts/logistic_model.joblib" \
            "models/artifacts/logistic_model.joblib"

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Pytest
        run: pytest -q
