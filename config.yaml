project:
  name: crypto-volatility
  author: "Team 3 (Rizaldy Utomo, Ridho Bakti, Jiho Hong, Afif Izzatullah)"
stream:
  websocket_url: wss://advanced-trade-ws.coinbase.com
  pairs:
    - BTC-USD
    - ETH-USD
  channels:
    - ticker
    - heartbeats
  heartbeat_timeout_seconds: 45
  reconnect_backoff_seconds:
    min: 1
    max: 30
  raw_topic: ticks.raw
  feature_topic: ticks.features
  bootstrap_servers: localhost:9094
features:
  bar_freq_seconds: 1
  target_horizon_seconds: 60
  ewma_span: 15
  tau_quantile: 0.75
storage:
  raw_dir: data/raw
  processed_dir: data/processed
  artifacts_dir: models/artifacts
  dashboard_dir: dashboard/data
tracking:
  mlflow_tracking_uri: sqlite:///mlruns/mlflow.db
  experiment_name: crypto-volatility
service:
  name: crypto-volatility-api
  version: 0.1.0
  host: 0.0.0.0
  port: 8000
  designation: Selected-base
  model_artifact: models/artifacts/logistic_model.joblib
  baseline_artifact: models/artifacts/baseline.json
  replay_source: data/processed/features.parquet
  replay_window_minutes: 10
  replay_slice_output: data/processed/features_replay_10min.parquet
reports:
  img_dir: img
  evidently_dir: reports/evidently
  template_path: templates/report.tex.j2
