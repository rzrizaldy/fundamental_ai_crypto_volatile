services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: crypto-kafka
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: crypto-mlflow
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow/mlruns
      - ./models/artifacts:/mlflow/artifacts
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlruns/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: crypto-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
  mlflow_data:
